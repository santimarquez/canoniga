name: Benchmark Gate Strict

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "benchmarks/curated/**"
      - "config/benchmark_gate_policy.json"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "migrations/**"
      - ".github/workflows/benchmark-gate-strict.yml"
  push:
    branches: [main, master]
    paths:
      - "benchmarks/curated/**"
      - "config/benchmark_gate_policy.json"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "migrations/**"
      - ".github/workflows/benchmark-gate-strict.yml"

jobs:
  benchmark-gate-strict:
    runs-on: ubuntu-latest
    env:
      PYTHON: python
      ALS_DATABASE_URL: postgresql://als:als@localhost:5432/als_intel
      ALS_TEST_DATABASE_URL: postgresql://als:als@localhost:5432/als_intel_test
      ALS_MIGRATIONS_DIR: ${{ github.workspace }}/migrations/postgres

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: als
          POSTGRES_PASSWORD: als
          POSTGRES_DB: als_intel
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U als -d als_intel"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Create isolated test database
        run: |
          python -c "from als_intel.db import ensure_database; ensure_database('postgresql://als:als@localhost:5432/als_intel_test')"
          ALS_DATABASE_URL=postgresql://als:als@localhost:5432/als_intel_test python -m als_intel init-db --db postgresql://als:als@localhost:5432/als_intel_test

      - name: Run extraction fidelity gate
        run: make test-extraction-fidelity

      - name: Run regression query gate
        run: make test-regression-queries

      - name: Validate curated benchmark directory
        run: |
          if [ ! -d "benchmarks/curated" ]; then
            echo "Missing required directory: benchmarks/curated"
            exit 1
          fi
          count=$(find benchmarks/curated -type f -name '*.jsonl' | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "No curated benchmark JSONL files found in benchmarks/curated"
            exit 1
          fi
          echo "Found $count curated benchmark JSONL files"

      - name: Create strict gate model fixture
        run: |
          python - <<'PY'
          from als_intel.store import EvidenceStore

          store = EvidenceStore()
          store.init_db()
          store.register_model(
              model_id="ci-strict-candidate-model",
              base_model="llama3.1:8b",
              adapter_path="/tmp/ci-strict-candidate-model",
              dataset_manifest_path="/tmp/manifest.json",
              training_config={"epochs": 1},
              metrics={"val_loss_estimate": 0.45, "train_rows": 500},
              status="trained",
              notes="strict benchmark gate fixture"
          )
          PY

      - name: Run strict benchmark gate
        run: |
          als-intel benchmark-gate \
            --candidate-model-id ci-strict-candidate-model \
            --input-path benchmarks/curated \
            --output-dir ci_artifacts/benchmark_gate_strict \
            --policy-file config/benchmark_gate_policy.json

      - name: Upload strict gate artifacts
        uses: actions/upload-artifact@v5
        with:
          name: benchmark-gate-strict-artifacts
          path: ci_artifacts/benchmark_gate_strict
