services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: als
      POSTGRES_PASSWORD: als
      POSTGRES_DB: als_intel
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U als -d als_intel"]
      interval: 5s
      timeout: 5s
      retries: 12

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      ALS_DATABASE_URL: postgresql://als:als@postgres:5432/als_intel
      ALS_MIGRATIONS_DIR: /app/migrations/postgres
      ALS_WEB_HOST: 0.0.0.0
      ALS_WEB_PORT: 8000
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: llama3.1:8b
      ALS_CONTEXT_LIMIT: 20
      ALS_TEMPERATURE: 0.1
      ALS_TIMEOUT_SECONDS: 300
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    volumes:
      - mailpit:/data
    environment:
      MP_DATABASE: /data/mailpit.db
      MP_MAX_MESSAGES: 500

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

volumes:
  ollama:
  mailpit:
  pgdata:
